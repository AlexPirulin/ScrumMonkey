<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <header class="navbar">
            <div class="nav-left">
                <div class="profile-avatars">
                    <div class="avatar dark">A</div>
                    <div class="avatar grey">A<span class="status-dot"></span></div>
                </div>
                <button class="icon-btn"><i class="far fa-bell"></i></button>
            </div>
            
            <nav class="nav-center">
                <a href="#" class="nav-link"><i class="fas fa-home"></i> Inicio</a>
                <a href="#" class="nav-link active"><i class="fas fa-check-double"></i> Tareas</a>
                <a href="#" class="nav-link"><i class="far fa-flag"></i> Proyectos</a>
            </nav>
            
            <div class="nav-right">
                <button id="theme-toggle" class="icon-btn" title="Cambiar tema"><i class="fas fa-moon"></i></button>
                <button class="icon-btn" title="Buscar"><i class="fas fa-search"></i></button>
                <button id="nav-add-task" class="btn-primary"><i class="fas fa-plus"></i> Tarea</button>
            </div>
        </header>

        <aside class="sidebar">
            <div class="sidebar-menu">
                <a href="#" class="sidebar-menu-item">
                    <i class="fas fa-sun"></i> Mi día <span class="badge">1</span>
                </a>
                <a href="#" class="sidebar-menu-item">
                    <i class="far fa-calendar-alt"></i> Próximos 7 días <span class="badge">1</span>
                </a>
                <a href="#" class="sidebar-menu-item">
                    <i class="fas fa-tasks"></i> Todas mis tareas <span class="badge">1</span>
                </a>
                <a href="#" class="sidebar-menu-item">
                    <i class="far fa-calendar"></i> Mi calendario <span class="badge-blue">Beta</span>
                </a>
                <button class="add-view-btn"><i class="fas fa-plus"></i> Crea una vista</button>
            </div>

            <div class="sidebar-divider"></div>

            <div class="sidebar-section">
                <div class="sidebar-header-flex">
                    <h2>Mis listas <i class="fas fa-lock" style="font-size: 10px; color: var(--text-muted); margin-left: 5px;"></i></h2>
                    <button class="icon-btn-small" onclick="document.getElementById('project-input').focus()" title="Añadir lista">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
                
                <form id="project-form" class="add-form sidebar-form">
                    <input type="text" id="project-input" placeholder="Nueva lista..." required>
                    <button type="submit" title="Añadir"><i class="fas fa-plus"></i></button>
                </form>

                <ul id="project-list" class="sidebar-list">
                </ul>
            </div>

            <!-- MONKEY-13: Sección de usuarios -->
            <div class="sidebar-divider"></div>

            <div class="sidebar-section">
                <div class="sidebar-header-flex">
                    <h2>Usuarios <i class="fas fa-users" style="font-size: 10px; color: var(--text-muted); margin-left: 5px;"></i></h2>
                    <button class="icon-btn-small" onclick="document.getElementById('user-input').focus()" title="Añadir usuario">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>

                <form id="user-form" class="add-form sidebar-form">
                    <input type="text" id="user-input" placeholder="Nuevo usuario..." required>
                    <button type="submit" title="Añadir"><i class="fas fa-plus"></i></button>
                </form>

                <ul id="user-list" class="sidebar-list"></ul>
            </div>

            <div class="danger-zone">
                <button id="btn-clear-all" class="btn-danger">
                    <i class="fas fa-trash-alt"></i> Borrar todo
                </button>
            </div>
        </aside>

        <main class="content">
            <header class="content-header">
                <h1 id="current-project-title">Selecciona un proyecto</h1>
            </header>

            <form id="task-form" class="add-task-form hidden">
                <input type="text" id="task-input" placeholder="Presiona 'Enter' para añadir..." required>
                <select id="task-priority" title="Prioridad">
                    <option value="baja">Baja</option>
                    <option value="media" selected>Media</option>
                    <option value="alta">Alta</option>
                </select>
                <button type="submit" class="add-task-btn"><i class="fas fa-plus"></i> Añadir</button>
            </form>

            <div class="view-toggle">
                <button id="btn-list-view" class="view-btn active">
                    <i class="fas fa-list"></i> Lista
                </button>
                <button id="btn-kanban-view" class="view-btn">
                    <i class="fas fa-columns"></i> Kanban
                </button>
            </div>

            <div id="list-view" class="task-list-container">
                <div class="task-section">
                    <div id="task-list" class="task-list"></div>
                </div>
            </div>

            <div id="kanban-view" class="kanban-board hidden">
                <div class="kanban-column" data-status="pendiente">
                    <div class="kanban-col-header">
                        <span class="kanban-col-dot dot-pending"></span>
                        <h3>Pendiente</h3>
                        <span class="kanban-count" id="count-pendiente">0</span>
                    </div>
                    <div class="kanban-cards" id="cards-pendiente"></div>
                </div>
                <div class="kanban-column" data-status="en-progreso">
                    <div class="kanban-col-header">
                        <span class="kanban-col-dot dot-progress"></span>
                        <h3>En progreso</h3>
                        <span class="kanban-count" id="count-en-progreso">0</span>
                    </div>
                    <div class="kanban-cards" id="cards-en-progreso"></div>
                </div>
                <div class="kanban-column" data-status="revision">
                    <div class="kanban-col-header">
                        <span class="kanban-col-dot dot-review"></span>
                        <h3>Revisión</h3>
                        <span class="kanban-count" id="count-revision">0</span>
                    </div>
                    <div class="kanban-cards" id="cards-revision"></div>
                </div>
                <div class="kanban-column" data-status="completada">
                    <div class="kanban-col-header">
                        <span class="kanban-col-dot dot-done"></span>
                        <h3>Completada</h3>
                        <span class="kanban-count" id="count-completada">0</span>
                    </div>
                    <div class="kanban-cards" id="cards-completada"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
