<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <header class="navbar">
            <div class="nav-left">
                <div class="profile-avatars">
                    <div class="avatar dark">A</div>
                    <div class="avatar grey">A<span class="status-dot"></span></div>
                </div>
                <button class="icon-btn"><i class="far fa-bell"></i></button>
            </div>
            
            <nav class="nav-center">
                <a href="#" class="nav-link"><i class="fas fa-home"></i> Inicio</a>
                <a href="#" class="nav-link active"><i class="fas fa-check-double"></i> Tareas</a>
                <a href="#" class="nav-link"><i class="far fa-flag"></i> Proyectos</a>
            </nav>
            
            <div class="nav-right">
                <button id="theme-toggle" class="icon-btn" title="Cambiar tema"><i class="fas fa-moon"></i></button>
                <button class="icon-btn" title="Buscar"><i class="fas fa-search"></i></button>
                <button id="nav-add-task" class="btn-primary"><i class="fas fa-plus"></i> Tarea</button>
            </div>
        </header>

        <aside class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-header">
                    <h2>Proyectos</h2>
                </div>
                
                <form id="project-form" class="add-form">
                    <input type="text" id="project-input" placeholder="Nuevo proyecto..." required>
                    <button type="submit" title="Añadir proyecto"><i class="fas fa-plus"></i></button>
                </form>

                <ul id="project-list" class="sidebar-list">
                    </ul>
            </div>
        </aside>

        <main class="content">
            <header class="content-header">
                <h1 id="current-project-title">Selecciona un proyecto</h1>
            </header>

            <form id="task-form" class="add-task-form hidden">
                <input type="text" id="task-input" placeholder="Presiona 'Enter' para añadir..." required>
                <select id="task-priority" title="Prioridad">
                    <option value="baja">Baja</option>
                    <option value="media" selected>Media</option>
                    <option value="alta">Alta</option>
                </select>
                <button type="submit" class="add-task-btn"><i class="fas fa-plus"></i> Añadir</button>
            </form>

            <div class="task-list-container">
                <div class="task-section">
                    <div id="task-list" class="task-list">
                        </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
