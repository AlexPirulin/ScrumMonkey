<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Proyectos</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="contenedor">
        <h1>Gestor de Proyectos 🚀</h1>

        <input type="text" id="nombreProyecto" placeholder="Nombre del proyecto">
        <button onclick="guardarProyecto()">Guardar Proyecto</button>

        <h2>Lista de Proyectos</h2>
        <ul id="listaProyectos"></ul>
    </div>

    <hr>

<h2>Gestión de Tareas</h2>

<input type="text" id="taskName" placeholder="Nombre de la tarea">

<select id="priority">
    <option value="Baja">Baja</option>
    <option value="Media">Media</option>
    <option value="Alta">Alta</option>
</select>

<select id="status">
    <option value="Pendiente">Pendiente</option>
    <option value="En proceso">En proceso</option>
    <option value="Completada">Completada</option>
</select>

<button id="btnTask" onclick="addTask()">Agregar Tarea</button>

<ul id="taskList"></ul>
    <script src="js/storage.js"></script> 
    <script src="js/app.js"></script>
</body>
</html>
